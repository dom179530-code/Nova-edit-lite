name: Build Android APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build web assets
        run: npx vite build --config vite.android.config.js
        env:
          PORT: 3000
          BASE_PATH: /
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.1"
      - name: Gradle wrapper + permissions
        run: |
          chmod +x android/gradlew
          mkdir -p android/gradle/wrapper
          curl -sL "https://services.gradle.org/distributions/gradle-8.11.1-bin.zip" -o /tmp/g.zip
          unzip -q /tmp/g.zip -d /tmp/gx
          cp $(find /tmp/gx -name "gradle-wrapper.jar" | head -1) android/gradle/wrapper/gradle-wrapper.jar
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-edit-lite-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      - name: APK info
        if: always()
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          [ -f "$APK" ] && echo "APK size: $(du -sh $APK)" || echo "APK not found"
