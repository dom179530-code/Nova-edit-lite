name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install
        working-directory: .

      - name: Build web assets for Android
        run: npx vite build --config vite.android.config.ts
        working-directory: artifacts/nova-edit-lite
        env:
          PORT: 3000
          BASE_PATH: /

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.1"

      - name: Make gradlew executable
        run: chmod +x android/gradlew
        working-directory: artifacts/nova-edit-lite

      - name: Download Gradle wrapper JAR
        run: |
          curl -sL "https://github.com/gradle/gradle/raw/v8.11.1/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar
        working-directory: artifacts/nova-edit-lite

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: artifacts/nova-edit-lite/android
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-edit-lite-debug-apk
          path: artifacts/nova-edit-lite/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK info
        run: |
          APK=artifacts/nova-edit-lite/android/app/build/outputs/apk/debug/app-debug.apk
          if [ -f "$APK" ]; then
            echo "✅ APK built successfully!"
            echo "Size: $(du -sh $APK | cut -f1)"
          fi
