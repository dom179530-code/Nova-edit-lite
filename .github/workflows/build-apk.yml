name: Build Android APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Build web assets
        run: npx vite build --config vite.android.config.js
        env:
          PORT: 3000
          BASE_PATH: /

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: yes | sdkmanager "platforms;android-36" "build-tools;36.0.0" || true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon
        working-directory: android
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-edit-lite-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: APK info
        if: always()
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          [ -f "$APK" ] && echo "✅ APK built: $(du -sh $APK | cut -f1)" || echo "APK not found"
