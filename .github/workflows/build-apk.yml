name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web assets for Android
        run: npx vite build --config vite.android.config.js
        env:
          PORT: 3000
          BASE_PATH: /

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.1"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Download Gradle wrapper JAR
        run: |
          mkdir -p android/gradle/wrapper
          curl -sL "https://services.gradle.org/distributions/gradle-8.11.1-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-extract
          cp $(find /tmp/gradle-extract -name "gradle-wrapper.jar" | head -1) \
             android/gradle/wrapper/gradle-wrapper.jar
          echo "Gradle wrapper: $(du -sh android/gradle/wrapper/gradle-wrapper.jar | cut -f1)"

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-edit-lite-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK info
        if: always()
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          if [ -f "$APK" ]; then
            echo "APK built! Size: $(du -sh $APK | cut -f1)"
          fi
