kind = "web"
previewPath = "/"
title = "Nova Edit Lite"
version = "1.0.0"
id = "artifacts/nova-edit-lite"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23021

[services.development]
run = "pnpm --filter @workspace/nova-edit-lite run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nova-edit-lite", "run", "build" ]
publicDir = "artifacts/nova-edit-lite/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23021"
BASE_PATH = "/"
